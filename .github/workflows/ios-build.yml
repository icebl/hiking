name: iOS Build (unsigned IPA)

# 在云端 macOS 上编译出未签名的 .ipa，供 Sideloadly/AltStore 用你的 Apple ID 重签后安装。
# 触发：推送到 main 自动构建，或在 Actions 页面手动运行（workflow_dispatch）。

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # XcodeGen 生成的是新版工程格式(objectVersion 77)，需较新的 Xcode 才能读取
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: front
        run: xcodegen generate

      # 缓存解析下来的 Swift 包（MapLibre/GRDB/CoreGPX），避免每次重新拉取/解析，省构建时间与分钟。
      # 依赖版本写在 project.yml，故以其哈希作缓存键；变更后自动失效重建。
      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: front/SourcePackages
          key: spm-${{ hashFiles('front/project.yml') }}
          restore-keys: spm-

      - name: Build (no code signing)
        working-directory: front
        run: |
          set -o pipefail
          xcodebuild \
            -project Hiking.xcodeproj \
            -scheme Hiking \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build | xcpretty || xcodebuild \
            -project Hiking.xcodeproj -scheme Hiking -configuration Release \
            -sdk iphoneos -derivedDataPath build \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package unsigned IPA
        working-directory: front
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "App: $APP"
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr Hiking-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hiking-unsigned-ipa
          path: front/Hiking-unsigned.ipa
          if-no-files-found: error
