name: iOS Build (unsigned IPA)

# 在云端 macOS 上编译出未签名的 .ipa，供 Sideloadly/AltStore 用你的 Apple ID 重签后安装。
# 触发：推送到 main 自动构建，或在 Actions 页面手动运行（workflow_dispatch）。

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      # runner 镜像预装了未受信任的 tap(aws/tap)，新版 Homebrew 的 tap 信任校验会打断 brew install。
      # 关掉信任校验，让 brew install xcodegen 正常进行（xcodegen 来自 homebrew-core）。
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
      HOMEBREW_NO_AUTO_UPDATE: 1   # 跳过自动 update，加快并避免触发 tap 扫描
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # XcodeGen 生成的是新版工程格式(objectVersion 77)，需较新的 Xcode 才能读取
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: front
        run: xcodegen generate

      # 缓存解析下来的 Swift 包（MapLibre/GRDB/CoreGPX），避免每次重新拉取/解析，省构建时间与分钟。
      # 依赖版本写在 project.yml，故以其哈希作缓存键；变更后自动失效重建。
      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: front/SourcePackages
          key: spm-${{ hashFiles('front/project.yml') }}
          restore-keys: spm-

      - name: Build (no code signing)
        working-directory: front
        run: |
          set -o pipefail
          # 完整日志存盘 + xcpretty 美化输出；失败时从完整日志提取真正的 error: 行
          xcodebuild \
            -project Hiking.xcodeproj \
            -scheme Hiking \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee xcodebuild-full.log | xcpretty || true
          status=${PIPESTATUS[0]}   # 取 xcodebuild 的真实退出码（非 xcpretty 的）
          if [ "$status" -ne 0 ]; then
            echo "::group::Swift 编译错误（从完整日志提取）"
            grep -nE "error: " xcodebuild-full.log || tail -120 xcodebuild-full.log
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Package unsigned IPA
        working-directory: front
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "App: $APP"
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr Hiking-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hiking-unsigned-ipa
          path: front/Hiking-unsigned.ipa
          if-no-files-found: error
